name: List All Tenants

on:
  workflow_dispatch:
    inputs:
      region:
        description: 'Select Region (or all)'
        required: true
        type: choice
        options:
          - us
          - uk
          - eu
          - all

jobs:
  list:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout GitOps Repo
        uses: actions/checkout@v3
        with:
          repository: yousmakhayyam/Apporto-demo-k8s-gitops
          token: ${{ secrets.GITOPS_PAT }}

      - name: List Tenants and Generate Summary
        run: |
          echo "# 📋 Tenant List" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ inputs.region }}" == "all" ]; then
            echo "## 🌍 All Regions" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Region | Cluster | Tenants |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|---------|---------|" >> $GITHUB_STEP_SUMMARY
            
            for region in tenants/*; do
              region_name=$(basename $region)
              if [ -d "$region/primary-01" ]; then
                tenants=$(ls $region/primary-01/ 2>/dev/null | paste -sd "," -)
                echo "| $region_name | primary-01 | $tenants |" >> $GITHUB_STEP_SUMMARY
              fi
            done
          else
            echo "## 🎯 Region: ${{ inputs.region }}" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Cluster | Tenants |" >> $GITHUB_STEP_SUMMARY
            echo "|---------|---------|" >> $GITHUB_STEP_SUMMARY
            
            if [ -d "tenants/${{ inputs.region }}/primary-01" ]; then
              tenants=$(ls tenants/${{ inputs.region }}/primary-01/ 2>/dev/null | paste -sd "," -)
              echo "| primary-01 | $tenants |" >> $GITHUB_STEP_SUMMARY
            else
              echo "| primary-01 | No tenants found |" >> $GITHUB_STEP_SUMMARY
            fi
          fi
          
          echo "✅ Tenant list generated successfully!"