name: Onboard New Tenant

on:
  workflow_dispatch:
    inputs:
      region:
        description: 'Select Region'
        required: true
        type: choice
        options:
          - us
          - uk
          - eu
      cluster:
        description: 'Select Cluster'
        required: true
        type: choice
        options:
          - primary-01
          - primary-02
          - satellite-01
      tenant_id:
        description: 'Tenant ID (e.g., harvard)'
        required: true
      domain:
        description: 'Domain (e.g., harvard.apporto.com)'
        required: true

jobs:
  onboard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout GitOps Repo
        uses: actions/checkout@v3
        with:
          repository: yousmakhayyam/Apporto-demo-k8s-gitops
          token: ${{ secrets.GITOPS_PAT }}

      - name: Create Tenant Structure
        run: |
          REGION="${{ inputs.region }}"
          CLUSTER="${{ inputs.cluster }}"
          TENANT="${{ inputs.tenant_id }}"

          mkdir -p tenants/$REGION/$CLUSTER/$TENANT/tenant-api
          mkdir -p tenants/$REGION/$CLUSTER/$TENANT/tenant-app
          mkdir -p tenants/$REGION/$CLUSTER/$TENANT/tenant-dragonfly

          cp tenants/_templates/tenant-api/values.yaml tenants/$REGION/$CLUSTER/$TENANT/tenant-api/
          cp tenants/_templates/tenant-app/values.yaml tenants/$REGION/$CLUSTER/$TENANT/tenant-app/
          cp tenants/_templates/tenant-dragonfly/values.yaml tenants/$REGION/$CLUSTER/$TENANT/tenant-dragonfly/

          sed -i "s/TENANT_PLACEHOLDER/$TENANT/g" tenants/$REGION/$CLUSTER/$TENANT/*/values.yaml
          sed -i "s/DOMAIN_PLACEHOLDER/${{ inputs.domain }}/g" tenants/$REGION/$CLUSTER/$TENANT/*/values.yaml

          echo "✅ Tenant $TENANT created in $REGION/$CLUSTER"

      - name: Commit and Push
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add tenants/${{ inputs.region }}/${{ inputs.cluster }}/${{ inputs.tenant_id }}
          git commit -m "onboard: region-${{ inputs.region }} cluster-${{ inputs.cluster }} tenant-${{ inputs.tenant_id }}"
          git push origin main