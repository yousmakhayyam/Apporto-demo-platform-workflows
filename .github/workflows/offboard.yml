name: Offboard Tenant

on:
  workflow_dispatch:
    inputs:
      region:
        description: 'Select Region'
        required: true
        type: choice
        options:
          - us
          - uk
          - eu
      cluster:
        description: 'Select Cluster'
        required: true
        type: choice
        options:
          - primary-01
          - primary-02
          - satellite-01
      tenant:
        description: 'Tenant ID to remove'
        required: true

jobs:
  offboard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout GitOps Repo
        uses: actions/checkout@v3
        with:
          repository: yousmakhayyam/Apporto-demo-k8s-gitops
          token: ${{ secrets.GITOPS_PAT }}

      - name: Archive Tenant
        run: |
          mkdir -p archived/${{ inputs.region }}/${{ inputs.cluster }}
          mv tenants/${{ inputs.region }}/${{ inputs.cluster }}/${{ inputs.tenant }} archived/${{ inputs.region }}/${{ inputs.cluster }}/
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add -A
          git commit -m "offboard: region-${{ inputs.region }} cluster-${{ inputs.cluster }} tenant-${{ inputs.tenant }}"
          git push origin main